backend:
  name: github
  repo: OBM-OPC/oberbeck-marketing-website
  branch: main
  auth_scope: repo
  base_url: https://api.netlify.com
  auth_endpoint: /auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    preview_path: "/blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Description", name: "description", widget: "text", required: true }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", required: true }
      - { label: "Author", name: "author", widget: "string", default: "Philipp Oberbeck" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { 
          label: "Tags", 
          name: "tags", 
          widget: "list", 
          default: ["Marketing"],
          field: { label: "Tag", name: "tag", widget: "string" }
        }
      - { label: "Featured Post", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: true }